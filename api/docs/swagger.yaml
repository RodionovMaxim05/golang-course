basePath: /
definitions:
  repo-watcher_api_internal_controller_http_dto.ErrorResponse:
    properties:
      error:
        type: string
    type: object
  repo-watcher_api_internal_controller_http_dto.PingResponse:
    properties:
      services:
        items:
          $ref: '#/definitions/repo-watcher_api_internal_controller_http_dto.ServiceStatus'
        type: array
      status:
        type: string
    type: object
  repo-watcher_api_internal_controller_http_dto.RepoInfoResponse:
    properties:
      created_at:
        type: string
      description:
        type: string
      forks:
        type: integer
      full_name:
        type: string
      stars:
        type: integer
    type: object
  repo-watcher_api_internal_controller_http_dto.ServiceStatus:
    properties:
      name:
        type: string
      status:
        type: string
    type: object
  repo-watcher_api_internal_controller_http_dto.SubscriptionResponse:
    properties:
      created_at:
        type: string
      owner:
        type: string
      repo:
        type: string
    type: object
host: localhost:28080
info:
  contact: {}
  description: API Gateway for repository statistics
  title: Repo Stat API
  version: "1.0"
paths:
  /api/ping:
    get:
      description: Get ping status of processor and subscriber
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/repo-watcher_api_internal_controller_http_dto.PingResponse'
        "503":
          description: Service Unavailable
          schema:
            $ref: '#/definitions/repo-watcher_api_internal_controller_http_dto.PingResponse'
      summary: Ping services
  /api/repositories/info:
    get:
      description: |-
        Get basic information about a GitHub repository. If the
        repository's data has not been collected yet, returns 202
        with an error message indicating the data is still being
        processed; retry the request later.
      parameters:
      - description: GitHub repository URL (e.g. https://github.com/golang/go)
        in: query
        name: url
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/repo-watcher_api_internal_controller_http_dto.RepoInfoResponse'
        "202":
          description: repository data collection in progress, retry later
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: invalid or missing url
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: repository not found on GitHub
          schema:
            additionalProperties:
              type: string
            type: object
        "429":
          description: GitHub API rate limit exceeded
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: internal server error
          schema:
            additionalProperties:
              type: string
            type: object
        "503":
          description: processor service unavailable
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get repository info
  /api/subscriptions:
    get:
      description: Return all subscribed GitHub repositories
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/repo-watcher_api_internal_controller_http_dto.SubscriptionResponse'
            type: array
        "500":
          description: internal server error
          schema:
            $ref: '#/definitions/repo-watcher_api_internal_controller_http_dto.ErrorResponse'
      summary: Get current subscription list
    post:
      description: Subscribe to receive information about the GitHub repository
      parameters:
      - description: GitHub repository URL (e.g. https://github.com/golang/go)
        in: query
        name: url
        required: true
        type: string
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/repo-watcher_api_internal_controller_http_dto.SubscriptionResponse'
        "400":
          description: invalid or missing url
          schema:
            $ref: '#/definitions/repo-watcher_api_internal_controller_http_dto.ErrorResponse'
        "404":
          description: repository not found on GitHub
          schema:
            $ref: '#/definitions/repo-watcher_api_internal_controller_http_dto.ErrorResponse'
        "409":
          description: already subscribed
          schema:
            $ref: '#/definitions/repo-watcher_api_internal_controller_http_dto.ErrorResponse'
        "429":
          description: GitHub API rate limit exceeded
          schema:
            $ref: '#/definitions/repo-watcher_api_internal_controller_http_dto.ErrorResponse'
        "500":
          description: internal server error
          schema:
            $ref: '#/definitions/repo-watcher_api_internal_controller_http_dto.ErrorResponse'
      summary: Subscribe to the repository
  /api/subscriptions/{owner}/{repo}:
    delete:
      description: Remove subscription for GitHub repository
      parameters:
      - description: Repository owner
        in: path
        name: owner
        required: true
        type: string
      - description: Repository name
        in: path
        name: repo
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: missing owner or repo
          schema:
            $ref: '#/definitions/repo-watcher_api_internal_controller_http_dto.ErrorResponse'
        "404":
          description: subscription not found
          schema:
            $ref: '#/definitions/repo-watcher_api_internal_controller_http_dto.ErrorResponse'
        "500":
          description: internal server error
          schema:
            $ref: '#/definitions/repo-watcher_api_internal_controller_http_dto.ErrorResponse'
      summary: Unsubscribe from the repository
  /api/subscriptions/info:
    get:
      description: Retrieve aggregated information for all subscribed repositories
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/repo-watcher_api_internal_controller_http_dto.RepoInfoResponse'
            type: array
        "500":
          description: internal server error
          schema:
            $ref: '#/definitions/repo-watcher_api_internal_controller_http_dto.ErrorResponse'
      summary: Get subscribed repositories info
swagger: "2.0"
