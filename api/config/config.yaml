app:
  app_name: "repo-watcher-api"

http:
  address: "localhost:8080"
  timeout: "5s"
  idle_timeout: "30s"

services:
  subscriber: "localhost:8081"
  processor: "localhost:8083"

redis:
  host: "localhost"
  port: 6379

cache:
  ttl_seconds: 60

rate_limit:
  requests_per_second: 5
  burst: 10

logger:
  log_level: "DEBUG"
