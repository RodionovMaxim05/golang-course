name: CI

on: [push, pull_request]

permissions:
  contents: read

jobs:
  lint-and-unit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        task: [task3, task4]
    defaults:
      run:
        working-directory: ${{ matrix.task }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ matrix.task }}/repo-stat/go.mod
          cache: true
          cache-dependency-path: ${{ matrix.task }}/repo-stat/go.sum

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Install tools
        run: make -C repo-stat tools

      - name: Check protobuf generation
        run: |
          make proto
          git diff --exit-code

      - name: Lint
        run: make lint

      - name: Unit
        run: make unit

  integration:
    runs-on: ubuntu-latest
    needs: lint-and-unit
    strategy:
      fail-fast: false
      matrix:
        task: [task3, task4]
    defaults:
      run:
        working-directory: ${{ matrix.task }}
    steps:
      - uses: actions/checkout@v5

      - name: Integration tests
        run: make test
        env:
          CONTAINER_RUNTIME: docker
