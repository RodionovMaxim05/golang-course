services:
  collector:
    build:
      context: ../..
      dockerfile: infrastructure/local/collector.dockerfile
    ports:
      - "50051:50051"
    environment:
      - COLLECTOR_PORT=:50051
    networks:
      - app-network

  gateway:
    build:
      context: ../..
      dockerfile: infrastructure/local/gateway.dockerfile
    ports:
      - "8080:8080"
    environment:
      - COLLECTOR_ADDR=collector:50051
      - GATEWAY_PORT=:8080
    depends_on:
      - collector
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
