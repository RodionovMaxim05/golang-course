services:
  api:
    image: api:latest
    build:
      context: repo-stat
      dockerfile: infrastructure/Dockerfile.api
    container_name: api
    restart: unless-stopped
    ports:
      - 28080:8080
    volumes:
      - ./repo-stat/api/config/config.yaml:/config.yaml
    environment:
      - LISTEN_ADDRESS=:8080
      - SUBSCRIBER_ADDRESS=subscriber:8081
      - PROCESSOR_ADDRESS=processor:8083
    depends_on:
      - subscriber
      - processor

  subscriber:
    image: subscriber:latest
    build:
      context: repo-stat
      dockerfile: infrastructure/Dockerfile.subscriber
    container_name: subscriber
    restart: unless-stopped
    ports:
      - 28081:8081
    volumes:
      - ./repo-stat/subscriber/config/config.yaml:/config.yaml
    environment:
      - LISTEN_ADDRESS=:8081
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
      - POSTGRES_DB=${POSTGRES_DB:-repo_stat}
      - POSTGRES_HOST=${POSTGRES_HOST:-postgres}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_SSLMODE=${POSTGRES_SSLMODE:-disable}
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:18-alpine
    container_name: postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
      - POSTGRES_DB=${POSTGRES_DB:-repo_stat}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-repo_stat}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  migrate:
    image: migrate/migrate:v4.15.0
    container_name: migrate
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
      - POSTGRES_DB=${POSTGRES_DB:-repo_stat}
      - POSTGRES_HOST=${POSTGRES_HOST:-postgres}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_SSLMODE=${POSTGRES_SSLMODE:-disable}
    command: ["-path", "/migrations", "-database", "postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}?sslmode=${POSTGRES_SSLMODE}", "up"]
    volumes:
      - ./repo-stat/subscriber/migrations:/migrations
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  processor:
    image: processor:latest
    build:
      context: repo-stat
      dockerfile: infrastructure/Dockerfile.processor
    container_name: processor
    restart: unless-stopped
    ports:
      - 28083:8083
    volumes:
      - ./repo-stat/processor/config/config.yaml:/config.yaml
    environment:
      - LISTEN_ADDRESS=:8083
      - COLLECTOR_ADDRESS=collector:8082
    depends_on:
      - collector

  collector:
    image: collector:latest
    build:
      context: repo-stat
      dockerfile: infrastructure/Dockerfile.collector
    container_name: collector
    restart: unless-stopped
    ports:
      - 28082:8082
    volumes:
      - ./repo-stat/collector/config/config.yaml:/config.yaml
    environment:
      - LISTEN_ADDRESS=:8082
      - SUBSCRIBER_ADDRESS=subscriber:8081

  tests:
    image: tests:latest
    build:
      context: tests
    container_name: tests
    restart: "no"
    depends_on:
      - api
    entrypoint: ["true"]

volumes:
  postgres_data:
