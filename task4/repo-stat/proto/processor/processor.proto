syntax = "proto3";

package processor.v1;

import "google/protobuf/timestamp.proto";

option go_package = "repo-stat/proto/gen/go/processor/v1;processorv1";

service Processor {
  rpc Ping(PingRequest) returns (PingResponse);
  rpc GetRepo(GetRepoRequest) returns (GetRepoResponse);
  rpc GetSubscriptionsInfo(GetSubsInfoRequest) returns (GetSubsInfoResponse);
}

message PingRequest {
}

message PingResponse {
  string reply = 1;
}

message GetRepoRequest {
  string name = 1;
  string repo = 2;
}

message GetRepoResponse {
  string full_name = 1;
  string description = 2;
  int32 stargazers_count = 3;
  int32 forks_count = 4;
  google.protobuf.Timestamp created_at = 5;
}

message GetSubsInfoRequest {
}

message GetSubsInfoResponse {
  repeated GetRepoResponse repositories = 1;
}
