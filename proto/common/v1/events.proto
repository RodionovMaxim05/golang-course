syntax = "proto3";

package common.v1;

import "google/protobuf/timestamp.proto";

option go_package = "repo-watcher/proto/gen/go/common/v1;commonv1";

message GetRepoResultEvent {
  string full_name = 1;

  oneof result {
    CollectRepoSuccess success = 2;
    ErrorResponse error = 3;
  }
}

message CollectRepoSuccess {
  string description = 1;
  int32 stargazers_count = 2;
  int32 forks_count = 3;
  google.protobuf.Timestamp created_at = 4;
}

enum ErrorCode {
  ERROR_CODE_UNSPECIFIED = 0;
  ERROR_CODE_REPOSITORY_NOT_FOUND = 1;
  ERROR_CODE_GITHUB_RATE_LIMIT_EXCEEDED = 2;
  ERROR_CODE_INTERNAL_COLLECTOR_ERROR = 3;
}

message ErrorResponse {
  ErrorCode code = 1;
  string message = 2;
}
