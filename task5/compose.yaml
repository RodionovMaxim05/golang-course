services:
  kafka:
    image: apache/kafka:latest
    container_name: kafka
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: INSIDE://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,OUTSIDE://0.0.0.0:19092
      KAFKA_ADVERTISED_LISTENERS: INSIDE://kafka:9092,OUTSIDE://localhost:19092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INSIDE:PLAINTEXT,OUTSIDE:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INSIDE
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 2s
      timeout: 5s
      retries: 5

  kafka-init:
    image: apache/kafka:latest
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    command: bash -c "/opt/kafka/bin/kafka-topics.sh --create --if-not-exists --bootstrap-server kafka:9092 --topic repo-requests --partitions 3 --replication-factor 1 && /opt/kafka/bin/kafka-topics.sh --create --if-not-exists --bootstrap-server kafka:9092 --topic repo-results --partitions 3 --replication-factor 1"

  postgres_sub:
    image: postgres:17-alpine
    container_name: postgres_sub
    restart: unless-stopped
    ports:
      - "${SUB_POSTGRES_PORT:-5431}:5432"
    environment:
      - POSTGRES_USER=${SUB_POSTGRES_USER:-sub_user}
      - POSTGRES_PASSWORD=${SUB_POSTGRES_PASSWORD:-sub_password}
      - POSTGRES_DB=${SUB_POSTGRES_DB:-subscriber_db}
    volumes:
      - postgres_sub_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 2s
      timeout: 5s
      retries: 5

  postgres_proc:
    image: postgres:17-alpine
    container_name: postgres_proc
    restart: unless-stopped
    ports:
      - "${PROC_POSTGRES_PORT:-5432}:5432"
    environment:
      - POSTGRES_USER=${PROC_POSTGRES_USER:-proc_user}
      - POSTGRES_PASSWORD=${PROC_POSTGRES_PASSWORD:-proc_password}
      - POSTGRES_DB=${PROC_POSTGRES_DB:-processor_db}
    volumes:
      - postgres_proc_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 2s
      timeout: 5s
      retries: 5

  migrate_sub:
    image: migrate/migrate
    container_name: migrate_sub
    volumes:
      - ./repo-stat/subscriber/migrations:/migrations
    command: [
      "-path", "/migrations",
      "-database", "postgres://${SUB_POSTGRES_USER:-sub_user}:${SUB_POSTGRES_PASSWORD:-sub_password}@postgres_sub:5432/${SUB_POSTGRES_DB:-subscriber_db}?sslmode=${SUB_POSTGRES_SSLMODE:-disable}",
      "up"
    ]
    depends_on:
      postgres_sub:
        condition: service_healthy

  migrate_proc:
    image: migrate/migrate
    container_name: migrate_proc
    volumes:
      - ./repo-stat/processor/migrations:/migrations
    command: [
      "-path", "/migrations",
      "-database", "postgres://${PROC_POSTGRES_USER:-proc_user}:${PROC_POSTGRES_PASSWORD:-proc_password}@postgres_proc:5432/${PROC_POSTGRES_DB:-processor_db}?sslmode=${PROC_POSTGRES_SSLMODE:-disable}",
      "up"
    ]
    depends_on:
      postgres_proc:
        condition: service_healthy

  api:
    image: api:latest
    build:
      context: repo-stat
      dockerfile: infrastructure/Dockerfile.api
    container_name: api
    restart: unless-stopped
    ports:
      - 28080:8080
    volumes:
      - ./repo-stat/api/config/config.yaml:/config.yaml
    environment:
      - LISTEN_ADDRESS=:8080
      - SUBSCRIBER_ADDRESS=subscriber:8081
      - PROCESSOR_ADDRESS=processor:8083
    depends_on:
      subscriber:
        condition: service_started
      processor:
        condition: service_started

  subscriber:
    image: subscriber:latest
    build:
      context: repo-stat
      dockerfile: infrastructure/Dockerfile.subscriber
    container_name: subscriber
    restart: unless-stopped
    ports:
      - 28081:8081
    volumes:
      - ./repo-stat/subscriber/config/config.yaml:/config.yaml
    environment:
      - LISTEN_ADDRESS=:8081
      - SUB_POSTGRES_USER=${SUB_POSTGRES_USER:-sub_user}
      - SUB_POSTGRES_PASSWORD=${SUB_POSTGRES_PASSWORD:-sub_password}
      - SUB_POSTGRES_HOST=${SUB_POSTGRES_HOST:-postgres_sub}
      - SUB_POSTGRES_PORT=${SUB_POSTGRES_PORT:-5432}
      - SUB_POSTGRES_DB=${SUB_POSTGRES_DB:-subscriber_db}
      - SUB_POSTGRES_SSLMODE=${SUB_POSTGRES_SSLMODE:-disable}
    depends_on:
      migrate_sub:
        condition: service_completed_successfully

  processor:
    image: processor:latest
    build:
      context: repo-stat
      dockerfile: infrastructure/Dockerfile.processor
    container_name: processor
    restart: unless-stopped
    ports:
      - 28083:8083
    volumes:
      - ./repo-stat/processor/config/config.yaml:/config.yaml
    environment:
      - LISTEN_ADDRESS=:8083
      - SUBSCRIBER_ADDRESS=subscriber:8081
      - PROC_POSTGRES_USER=${PROC_POSTGRES_USER:-proc_user}
      - PROC_POSTGRES_PASSWORD=${PROC_POSTGRES_PASSWORD:-proc_password}
      - PROC_POSTGRES_HOST=${PROC_POSTGRES_HOST:-postgres_proc}
      - PROC_POSTGRES_PORT=${PROC_POSTGRES_PORT:-5432}
      - PROC_POSTGRES_DB=${PROC_POSTGRES_DB:-processor_db}
      - PROC_POSTGRES_SSLMODE=${PROC_POSTGRES_SSLMODE:-disable}
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      migrate_proc:
        condition: service_completed_successfully
      collector:
        condition: service_started

  collector:
    image: collector:latest
    build:
      context: repo-stat
      dockerfile: infrastructure/Dockerfile.collector
    container_name: collector
    restart: unless-stopped
    ports:
      - 28082:8082
    volumes:
      - ./repo-stat/collector/config/config.yaml:/config.yaml
    environment:
      - LISTEN_ADDRESS=:8082
      - SUBSCRIBER_ADDRESS=subscriber:8081
    depends_on:
      kafka-init:
        condition: service_completed_successfully
      subscriber:
        condition: service_started

  tests:
    image: tests:latest
    build:
      context: tests
    container_name: tests
    restart: "no"
    depends_on:
      - api
    entrypoint: ["true"]

volumes:
  postgres_sub_data:
  postgres_proc_data:
