syntax = "proto3";

package common.v1;

import "google/protobuf/timestamp.proto";

option go_package = "repo-stat/proto/gen/go/common/v1;commonv1";

message GetRepoResultEvent {
  string full_name = 1;

  oneof result {
    CollectRepoSuccess success = 2;
    ErrorResponse error = 3;
  }
}

message CollectRepoSuccess {
  string description = 1;
  int32 stargazers_count = 2;
  int32 forks_count = 3;
  google.protobuf.Timestamp created_at = 4;
}

message ErrorResponse {
  string code = 1;
  string message = 2;
}
